apiVersion: apps/v1
kind: Deployment
metadata:
  name: hari-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hari-web
  template:
    metadata:
      labels:
        app: hari-web
    spec:
      containers:
      - name: web-container
        image: hariprasad8452/hari-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hari-service
spec:
  type: NodePort
  selector:
    app: hari-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30005
